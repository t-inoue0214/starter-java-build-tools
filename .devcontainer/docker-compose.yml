services:

  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: app
    tty: true
    stdin_open: true
    depends_on:
      - nexus
    volumes:
      - ..:/workspaces/starter-java-build-tools/

  nexus:
    image: sonatype/nexus3:latest
    container_name: nexus
    ports:
      - "8081:8081"
    volumes:
      - nexus-data:/nexus-data

volumes:
  nexus-data: